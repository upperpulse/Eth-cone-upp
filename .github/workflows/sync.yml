name: ETH Cone Sync & Deploy

on:
  push:
    branches: [main]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version sync
        run: |
          # ดึง version จาก index.html
          DASH_VER=$(grep -o 'v[0-9]*\.[0-9]*' index.html | head -1)
          # ดึง version จาก bot.js
          BOT_VER=$(grep -o 'Dashboard v[0-9]*\.[0-9]*' bot.js | grep -o 'v[0-9]*\.[0-9]*' | head -1)
          
          echo "Dashboard version: $DASH_VER"
          echo "Bot version: $BOT_VER"
          
          if [ "$DASH_VER" != "$BOT_VER" ]; then
            echo "❌ Version ไม่ sync! Dashboard=$DASH_VER Bot=$BOT_VER"
            echo "กรุณา update version ใน bot.js ให้ตรงกับ index.html"
            exit 1
          fi
          echo "✅ Version sync: $DASH_VER"

      - name: Check logic.js exists
        run: |
          if [ ! -f "logic.js" ]; then
            echo "❌ logic.js ไม่มีในระบบ!"
            exit 1
          fi
          echo "✅ logic.js พร้อม"

      - name: Notify Telegram on success
        if: success()
        run: |
          DASH_VER=$(grep -o 'v[0-9]*\.[0-9]*' index.html | head -1)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT }}\",\"text\":\"✅ ETH Cone Deploy สำเร็จ!\\n\\n📦 Version: $DASH_VER\\n🔄 Logic: Synced\\n⏰ $(date '+%Y-%m-%d %H:%M') ICT\",\"parse_mode\":\"HTML\"}"

      - name: Notify Telegram on failure  
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT }}\",\"text\":\"❌ ETH Cone Deploy ล้มเหลว!\\n\\nVersion ไม่ sync หรือ logic.js หาย\\nกรุณาตรวจสอบก่อน push\",\"parse_mode\":\"HTML\"}"
