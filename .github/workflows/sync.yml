name: ETH Cone Sync & Deploy

on:
  push:
    branches: [main]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version sync
        run: |
          # Bot version จากบรรทัดแรกของ bot.js
          BOT_VER=$(head -1 bot.js | grep -oE 'v[0-9]+\.[0-9]+' | head -1)
          # BOT_VERSION const
          BOT_CONST=$(grep "^const BOT_VERSION" bot.js | grep -oE "v[0-9]+\.[0-9]+" | head -1)

          echo "Bot header: $BOT_VER | BOT_VERSION const: $BOT_CONST"

          if [ "$BOT_VER" != "$BOT_CONST" ]; then
            echo "❌ Bot version ไม่ตรง! header=$BOT_VER const=$BOT_CONST"
            exit 1
          fi
          echo "✅ Bot version OK: $BOT_VER"

      - name: Check logic.js exists
        run: |
          if [ ! -f "logic.js" ]; then
            echo "❌ logic.js ไม่มี!"
            exit 1
          fi
          echo "✅ logic.js v$(grep -oE "'[0-9]+\.[0-9]+'" logic.js | head -1) ready"

      - name: Notify success
        if: success()
        run: |
          BOT_VER=$(head -1 bot.js | grep -oE 'v[0-9]+\.[0-9]+' | head -1)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT }}\",\"text\":\"✅ Deploy สำเร็จ Bot $BOT_VER\",\"parse_mode\":\"HTML\"}"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT }}\",\"text\":\"❌ Deploy ล้มเหลว กรุณาตรวจสอบ\",\"parse_mode\":\"HTML\"}"
