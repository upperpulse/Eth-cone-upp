name: ETH Cone Sync & Deploy

on:
  push:
    branches: [main]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version sync
        run: |
          # Dashboard version จาก index.html
          DASH_VER=$(grep -o 'ETH Cone v[0-9]*\.[0-9]*' index.html | head -1 | grep -o 'v[0-9]*\.[0-9]*')
          # Bot version จาก บรรทัดแรก (ETH Cone Bot vX.X)
          BOT_VER=$(head -1 bot.js | grep -o 'v[0-9]*\.[0-9]*')
          # BOT_VERSION constant
          BOT_CONST=$(grep "BOT_VERSION = " bot.js | grep -o "v[0-9]*\.[0-9]*" | head -1)

          echo "Dashboard: $DASH_VER | Bot header: $BOT_VER | BOT_VERSION const: $BOT_CONST"

          if [ "$BOT_VER" != "$BOT_CONST" ]; then
            echo "❌ Bot header ไม่ตรงกับ BOT_VERSION const! header=$BOT_VER const=$BOT_CONST"
            exit 1
          fi
          echo "✅ Bot version sync OK: $BOT_VER"

      - name: Check logic.js exists
        run: |
          if [ ! -f "logic.js" ]; then
            echo "❌ logic.js ไม่มีในระบบ!"
            exit 1
          fi
          echo "✅ logic.js พร้อม"

      - name: Notify Telegram on success
        if: success()
        run: |
          BOT_VER=$(head -1 bot.js | grep -o 'v[0-9]*\.[0-9]*')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT }}\",\"text\":\"✅ ETH Cone Deploy สำเร็จ!\\n\\n🤖 Bot: $BOT_VER\\n🔄 Logic: Synced\\n⏰ $(date '+%Y-%m-%d %H:%M') ICT\",\"parse_mode\":\"HTML\"}"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT }}\",\"text\":\"❌ ETH Cone Deploy ล้มเหลว!\\n\\nVersion ไม่ sync หรือ logic.js หาย\\nกรุณาตรวจสอบก่อน push\",\"parse_mode\":\"HTML\"}"
